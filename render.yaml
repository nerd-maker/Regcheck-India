# render.yaml — Render Blueprint for backend deployment
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: regcheck-india-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-20250514
      - key: ANTHROPIC_MODEL_FAST
        value: claude-haiku-4-20250414
      - key: CHROMADB_PATH
        value: /app/data/chromadb
      - key: REGCHECK_RUNTIME_STATE_DB
        value: /app/data/runtime/runtime_state.db
      - key: AUDIT_LOG_RETENTION_DAYS
        value: "30"
      - key: AUDIT_LOG_ENCRYPTION_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        value: https://regcheck-india-three.vercel.app,https://regcheck-india.vercel.app,http://localhost:3000
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: "50"
      - key: RATE_LIMIT_PER_MINUTE
        value: "30"
    healthCheckPath: /health
